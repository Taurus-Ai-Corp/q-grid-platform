<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Q-GRID Comply — Full mark on dark background -->

  <defs>
    <filter id="hero-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Lattice icon (left side) -->
  <g transform="translate(8, 8)">
    <!-- Connection lines -->
    <g stroke="#00CCAA" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
      <line x1="20" y1="12" x2="44" y2="12"/>
      <line x1="20" y1="12" x2="12" y2="32"/>
      <line x1="44" y1="12" x2="52" y2="32"/>
      <line x1="12" y1="32" x2="20" y2="52"/>
      <line x1="52" y1="32" x2="44" y2="52"/>
      <line x1="20" y1="52" x2="44" y2="52"/>
      <line x1="20" y1="12" x2="32" y2="28"/>
      <line x1="44" y1="12" x2="32" y2="28"/>
      <line x1="12" y1="32" x2="32" y2="28"/>
      <line x1="52" y1="32" x2="32" y2="28"/>
      <line x1="32" y1="28" x2="20" y2="52"/>
      <line x1="32" y1="28" x2="44" y2="52"/>
      <line x1="44" y1="52" x2="56" y2="60"/>
    </g>
    <!-- Nodes -->
    <g filter="url(#hero-glow)">
      <circle cx="20" cy="12" r="3" fill="#00CCAA"/>
      <circle cx="44" cy="12" r="3" fill="#00CCAA"/>
      <circle cx="12" cy="32" r="3" fill="#00CCAA"/>
      <circle cx="32" cy="28" r="4" fill="#00CCAA"/>
      <circle cx="52" cy="32" r="3" fill="#00CCAA"/>
      <circle cx="20" cy="52" r="3" fill="#00CCAA"/>
      <circle cx="44" cy="52" r="3" fill="#00CCAA"/>
      <circle cx="56" cy="60" r="2.5" fill="#00CCAA"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="84" y="46" font-family="Jura, sans-serif" font-weight="700" font-size="28" fill="#E8E6DE" letter-spacing="1">
    <tspan fill="#00CCAA">Q</tspan><tspan>-GRID</tspan>
    <tspan fill="#4A4A4A" font-size="20" dx="4">/</tspan>
    <tspan fill="#00CCAA" dx="4">COMPLY</tspan>
  </text>

  <!-- Subtitle -->
  <text x="84" y="62" font-family="DM Sans, sans-serif" font-weight="400" font-size="10" fill="#7A7D72" letter-spacing="3">
    QUANTUM GRID COMPLIANCE
  </text>
</svg>
