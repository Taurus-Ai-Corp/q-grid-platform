<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Q-GRID Comply — Lattice Logo -->
  <!-- 8 nodes forming a Q-shaped crystallographic lattice -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Lattice connection lines -->
  <g stroke="#00CCAA" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <!-- Outer ring -->
    <line x1="20" y1="12" x2="44" y2="12"/>
    <line x1="20" y1="12" x2="12" y2="32"/>
    <line x1="44" y1="12" x2="52" y2="32"/>
    <line x1="12" y1="32" x2="20" y2="52"/>
    <line x1="52" y1="32" x2="44" y2="52"/>
    <line x1="20" y1="52" x2="44" y2="52"/>

    <!-- Inner cross-connections (lattice diagonals) -->
    <line x1="20" y1="12" x2="32" y2="28"/>
    <line x1="44" y1="12" x2="32" y2="28"/>
    <line x1="12" y1="32" x2="32" y2="28"/>
    <line x1="52" y1="32" x2="32" y2="28"/>
    <line x1="32" y1="28" x2="20" y2="52"/>
    <line x1="32" y1="28" x2="44" y2="52"/>

    <!-- Q tail -->
    <line x1="44" y1="52" x2="56" y2="60"/>
  </g>

  <!-- Lattice nodes -->
  <g filter="url(#glow)">
    <circle cx="20" cy="12" r="3" fill="#00CCAA"/>
    <circle cx="44" cy="12" r="3" fill="#00CCAA"/>
    <circle cx="12" cy="32" r="3" fill="#00CCAA"/>
    <circle cx="32" cy="28" r="4" fill="#00CCAA"/>
    <circle cx="52" cy="32" r="3" fill="#00CCAA"/>
    <circle cx="20" cy="52" r="3" fill="#00CCAA"/>
    <circle cx="44" cy="52" r="3" fill="#00CCAA"/>
    <circle cx="56" cy="60" r="2.5" fill="#00CCAA"/>
  </g>
</svg>
