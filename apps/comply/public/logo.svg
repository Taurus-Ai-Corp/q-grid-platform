<svg width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- GRIDERA|Comply — Grid Mesh Logo (Concept B) -->
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Grid lines -->
  <g stroke="#00CCAA" stroke-width="0.8" stroke-linecap="round" opacity="0.3">
    <line x1="20" y1="20" x2="50" y2="20"/><line x1="50" y1="20" x2="80" y2="20"/>
    <line x1="20" y1="50" x2="50" y2="50"/><line x1="50" y1="50" x2="80" y2="50"/>
    <line x1="20" y1="80" x2="50" y2="80"/><line x1="50" y1="80" x2="80" y2="80"/>
    <line x1="20" y1="20" x2="20" y2="50"/><line x1="20" y1="50" x2="20" y2="80"/>
    <line x1="50" y1="20" x2="50" y2="50"/><line x1="50" y1="50" x2="50" y2="80"/>
    <line x1="80" y1="20" x2="80" y2="50"/><line x1="80" y1="50" x2="80" y2="80"/>
    <line x1="20" y1="20" x2="50" y2="50"/><line x1="50" y1="20" x2="80" y2="50"/>
    <line x1="20" y1="50" x2="50" y2="80"/><line x1="50" y1="50" x2="80" y2="80"/>
    <line x1="80" y1="80" x2="95" y2="95"/>
  </g>
  <!-- Grid nodes -->
  <g filter="url(#glow)">
    <circle cx="20" cy="20" r="3" fill="#00CCAA"/>
    <circle cx="50" cy="20" r="3" fill="#00CCAA"/>
    <circle cx="80" cy="20" r="3" fill="#00CCAA"/>
    <circle cx="20" cy="50" r="3" fill="#00CCAA"/>
    <circle cx="50" cy="50" r="4.5" fill="#00CCAA"/>
    <circle cx="80" cy="50" r="3" fill="#00CCAA"/>
    <circle cx="20" cy="80" r="3" fill="#00CCAA"/>
    <circle cx="50" cy="80" r="3" fill="#00CCAA"/>
    <circle cx="80" cy="80" r="3" fill="#00CCAA"/>
    <circle cx="95" cy="95" r="2" fill="#00CCAA"/>
  </g>
</svg>
