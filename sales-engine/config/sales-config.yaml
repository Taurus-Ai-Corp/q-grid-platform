# Q-GRID Sales Engine Configuration
# Multi-model agent orchestration for revenue generation

version: "1.0"
created: "2026-03-29"

## Model Routing

orchestrator:
  model: "nemotron-3-super"
  provider: "nvidia-nim"
  endpoint: "https://integrate.api.nvidia.com/v1"
  env_var: "NVIDIA_API_KEY"
  role: "Coordination, task routing, workflow management"
  max_tokens: 4096
  temperature: 0.3

agents:
  scanner:
    model: "qwen3-coder-480b"
    provider: "nvidia-nim" 
    endpoint: "https://integrate.api.nvidia.com/v1"
    env_var: "NVIDIA_API_KEY"
    role: "Domain scanning, SSL analysis, QRS computation"
    max_tokens: 8192
    temperature: 0.1
    
  content:
    model: "arcee-trinity-large"
    provider: "nvidia-nim"
    endpoint: "https://integrate.api.nvidia.com/v1"
    env_var: "NVIDIA_API_KEY"
    role: "Outreach emails, LinkedIn posts, Product Hunt copy"
    max_tokens: 4096
    temperature: 0.7
    
  analyst:
    model: "stepfun-step-3-5-flash"
    provider: "nvidia-nim"
    endpoint: "https://integrate.api.nvidia.com/v1"
    env_var: "NVIDIA_API_KEY"
    role: "Lead scoring, proposal generation, competitive analysis"
    max_tokens: 8192
    temperature: 0.2

## Campaign Settings

campaign:
  name: "EU AI Act Q-Grid Launch"
  target_companies: 50
  industries:
    - fintech
    - banking
    - insurance
    - healthcare
    - autonomous-vehicles
    - recruitment
    - legal-tech
  
  geos:
    - DE  # Germany
    - FR  # France
    - NL  # Netherlands
    - SE  # Sweden
    - ES  # Spain
    - IT  # Italy
    
  pain_points:
    - "EU AI Act compliance deadline August 2026"
    - "Post-quantum cryptography migration (CNSA 2.0 by 2027)"
    - "SWIFT PQC mandate by 2027"
    - "No visibility into AI system cryptography"
    - "Manual compliance processes"

## Outreach Templates

email_templates:
  initial:
    subject: "[Company]'s AI systems and the August 2026 deadline"
    personalization_fields:
      - company_name
      - qrs_score
      - top_vulnerability
      - industry
      
  follow_up:
    subject: "Re: [Company]'s quantum readiness"
    delay_days: 3
    
  proposal:
    subject: "Q-GRID PQC Assessment Proposal for [Company]"
    sections:
      - executive_summary
      - current_state_assessment
      - migration_plan
      - pricing
      - timeline

## Revenue Targets

targets:
  week_1:
    scans_completed: 50
    emails_sent: 25
    meetings_booked: 3
    
  day_30:
    mrr: 1500
    paying_customers: 2
    
  day_90:
    mrr: 5000
    paying_customers: 8
    product_hunt_upvotes: 200
